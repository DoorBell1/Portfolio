<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duy (Simon) Pham | Electrical & Embedded Systems Engineer</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --primary: #1e3a8a;
            --secondary: #2563eb;
            --accent: #3b82f6;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        /* Sticky Navigation */
        nav {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(5px);
            z-index: 100;
        }
        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }
        .nav-logo {
            font-weight: bold;
            color: var(--primary);
            font-size: 1.2rem;
            text-decoration: none;
        }
        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: var(--secondary);
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Hero / Introduction Split Section */
        .hero-section {
            display: flex;
            gap: 40px;
            align-items: center;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 35px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .hero-text {
            flex: 2;
        }
        .hero-text h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin: 0 0 10px 0;
        }
        .hero-subtitle {
            font-size: 1.2rem;
            color: #475569;
            margin: 0 0 15px 0;
            font-weight: 500;
        }
        .hero-desc {
            color: #334155;
            font-size: 1.05rem;
            margin-bottom: 25px;
        }
        .hero-meta {
            font-size: 0.95rem;
            color: #475569;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        .hero-image-container {
            flex: 1;
            display: flex;
            justify-content: center;
        }
        /* Profile Image Placeholder */
        .profile-img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--border);
            background: #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            font-weight: 500;
            text-align: center;
            padding: 20px;
        }

        /* Action Buttons */
        .btn-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background-color: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background-color: var(--secondary);
        }
        .btn-secondary {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
